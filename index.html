<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Responsive Particle Heart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#080b18;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let heartScale = 1;
let orbitScale = 1;

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // ===== Responsive scale =====
    const minSide =
        Math.min(
            canvas.width,
            canvas.height
        );

    // scale trái tim
    heartScale =
        Math.max(
            0.45,
            Math.min(
                1.2,
                minSide / 900
            )
        );

    // scale quỹ đạo text
    orbitScale =
        Math.max(
            0.55,
            Math.min(
                1.2,
                minSide / 900
            )
        );
}

resize();
window.addEventListener(
    "resize",
    resize
);

// ================= RAIN =================

const rainParticles = [];
const RAIN_TOTAL = 1000;

class RainParticle{

    constructor(){
        this.reset();
    }

    reset(){

        this.x =
            Math.random()
            * canvas.width;

        this.y =
            Math.random()
            * canvas.height;

        this.length =
            Math.random() * 22 + 8;

        this.speed =
            Math.random() * 8 + 4;

        this.opacity =
            Math.random() * 0.7 + 0.25;

        this.width =
            Math.random() * 1.5 + 0.5;
    }

    update(){

        this.y += this.speed;
        this.x += this.speed * 0.15;

        if(
            this.y >
            canvas.height + 20
        ){
            this.reset();
            this.y = -20;
        }
    }

    draw(){

        ctx.beginPath();

        const gradient =
            ctx.createLinearGradient(
                this.x,
                this.y,
                this.x,
                this.y +
                this.length
            );

        gradient.addColorStop(
            0,
            "rgba(255,220,235,0)"
        );

        gradient.addColorStop(
            0.5,
            `rgba(
                255,
                120,
                180,
                ${this.opacity}
            )`
        );

        gradient.addColorStop(
            1,
            "rgba(255,80,150,0)"
        );

        ctx.strokeStyle =
            gradient;

        ctx.lineWidth =
            this.width;

        ctx.shadowBlur = 10;

        ctx.beginPath();

        ctx.moveTo(
            this.x,
            this.y
        );

        ctx.lineTo(
            this.x,
            this.y +
            this.length
        );

        ctx.stroke();
    }
}

for(let i=0;i<RAIN_TOTAL;i++){
    rainParticles.push(
        new RainParticle()
    );
}

// ================= HEART =================

const particles = [];
const TOTAL = 4500;

class Particle{

    constructor(){

        this.t =
            Math.random()
            * Math.PI * 2;

        this.radius =
            0.75 +
            Math.random() * 0.35;

        this.size =
            Math.random() * 1.5
            + 0.3;
    }

    draw(time){

        const beat =
            1 +
            Math.sin(
                time * 0.004
            ) * 0.08;

        let x =
            16 *
            Math.pow(
                Math.sin(this.t),
                3
            );

        let y = -(
            13 *
            Math.cos(this.t)
            - 5 *
            Math.cos(2*this.t)
            - 2 *
            Math.cos(3*this.t)
            - Math.cos(4*this.t)
        );

        x *= this.radius;
        y *= this.radius;

        const spread =
            12 * heartScale;

        // ===== responsive size =====
        const heartSize =
            20 * heartScale;

        const px =
            canvas.width/2 +
            x *
            heartSize *
            beat +
            (
                Math.random()-0.5
            ) * spread;

        const py =
            canvas.height/2 +
            y *
            heartSize *
            beat +
            (
                Math.random()-0.5
            ) * spread;

        const alpha =
            Math.random() *
            0.7 + 0.3;

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(
                255,
                120,
                170,
                ${alpha}
            )`;

        ctx.shadowBlur =
            12 *
            heartScale;

        ctx.arc(
            px,
            py,
            this.size
            * heartScale,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

for(let i=0;i<TOTAL;i++){
    particles.push(
        new Particle()
    );
}

// ================= TEXT ORBITS =================

const orbitSystems = [
    {
        text:"Ngọc Ánh",
        radius:220,
        speed:0.0005,
        count:6,
        size:12
    },
    {
        text:"Gửi người tôi thương",
        radius:290,
        speed:-0.00035,
        count:8,
        size:14
    },
    {
        text:"Ngọc Ánh",
        radius:360,
        speed:0.00025,
        count:10,
        size:16
    }
];

function drawTextOrbits(time){

    const cx =
        canvas.width / 2;

    const cy =
        canvas.height / 2;

    orbitSystems.forEach(
        orbit=>{

        const planets = [];

        for(
            let i=0;
            i<orbit.count;
            i++
        ){

            const angle =
                time *
                orbit.speed +
                (
                    Math.PI*2
                    / orbit.count
                ) * i;

            const depth =
                Math.cos(angle);

            const radius =
                orbit.radius
                * orbitScale;

            const x =
                cx +
                Math.sin(angle)
                * radius;

            const y =
                cy +
                Math.cos(angle)
                * radius
                * 0.28;

            const scale =
                0.55 +
                (
                    (depth+1)/2
                ) * 0.9;

            planets.push({
                x,
                y,
                scale,
                depth
            });
        }

        planets.sort(
            (a,b)=>
            a.depth-b.depth
        );

        planets.forEach(p=>{

            ctx.save();

            ctx.translate(
                p.x,
                p.y
            );

            ctx.scale(
                p.scale,
                p.scale
            );

            const opacity =
                0.35 +
                p.scale
                * 0.65;

            const fontSize =
                orbit.size
                * orbitScale;

            ctx.font =
                `bold ${fontSize}px Arial`;

            ctx.textAlign =
                "center";

            ctx.textBaseline =
                "middle";

            const paddingX = 18;
            const paddingY = 10;

            const textWidth =
                ctx.measureText(
                    orbit.text
                ).width;

            const boxWidth =
                textWidth +
                paddingX * 2;

            const boxHeight =
                fontSize +
                paddingY * 2;

            ctx.beginPath();

            ctx.fillStyle =
                `rgba(
                    255,
                    80,
                    160,
                    ${opacity*0.22}
                )`;

            ctx.strokeStyle =
                `rgba(
                    255,
                    180,
                    220,
                    ${opacity*0.4}
                )`;

            ctx.lineWidth = 1.5;

            ctx.roundRect(
                -boxWidth/2,
                -boxHeight/2,
                boxWidth,
                boxHeight,
                16
            );

            ctx.fill();
            ctx.stroke();

            ctx.shadowBlur =
                20 *
                p.scale;

            ctx.shadowColor =
                "#ff66b3";

            ctx.fillStyle =
                `rgba(
                    255,
                    220,
                    235,
                    ${opacity}
                )`;

            ctx.fillText(
                orbit.text,
                0,
                0
            );

            ctx.restore();
        });
    });
}

// ================= ANIMATE =================

function animate(time){

    ctx.fillStyle =
        `rgba(
            8,
            11,
            24,
            0.18
        )`;

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    rainParticles.forEach(
        r=>{
            r.update();
            r.draw();
        }
    );

    particles.forEach(
        p=>p.draw(time)
    );

    drawTextOrbits(time);

    requestAnimationFrame(
        animate
    );
}

animate();
</script>

</body>
</html>
