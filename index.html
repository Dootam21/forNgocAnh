<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Responsive Particle Heart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#080b18;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let heartScale = 1;
let orbitScale = 1;

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // ===== Responsive scale =====
    const minSide =
        Math.min(
            canvas.width,
            canvas.height
        );

    // scale trái tim
    heartScale =
        Math.max(
            0.45,
            Math.min(
                1.2,
                minSide / 900
            )
        );

    // scale quỹ đạo text
    orbitScale =
        Math.max(
            0.55,
            Math.min(
                1.2,
                minSide / 900
            )
        );
}

resize();
window.addEventListener(
    "resize",
    resize
);

// ================= RAIN =================

// ================= FULLSCREEN RAIN =================

const rainParticles = [];
let RAIN_TOTAL = 0;

function createRain(){

    rainParticles.length = 0;

    // mật độ mưa theo diện tích màn hình
    const screenArea =
        canvas.width *
        canvas.height;

    RAIN_TOTAL =
        Math.floor(
            screenArea / 1500
        );

    const cols =
        Math.ceil(
            Math.sqrt(RAIN_TOTAL)
        );

    const rows =
        Math.ceil(
            RAIN_TOTAL / cols
        );

    const spacingX =
        canvas.width / cols;

    const spacingY =
        canvas.height / rows;

    for(
        let row = 0;
        row < rows;
        row++
    ){

        for(
            let col = 0;
            col < cols;
            col++
        ){

            if(
                rainParticles.length
                >= RAIN_TOTAL
            ) break;

            rainParticles.push(
                new RainParticle(
                    col *
                    spacingX +
                    Math.random()
                    * spacingX,

                    row *
                    spacingY +
                    Math.random()
                    * spacingY
                )
            );
        }
    }
}

class RainParticle{

    constructor(x,y){

        this.baseX = x;
        this.baseY = y;

        this.reset();
    }

    reset(){

        this.x =
            this.baseX +
            (
                Math.random()-0.5
            ) * 40;

        this.y =
            Math.random()
            * canvas.height;

        this.length =
            Math.random()
            * 22 + 10;

        this.speed =
            Math.random()
            * 5 + 7;

        this.opacity =
            Math.random()
            * 0.4 + 0.45;

        this.width =
            Math.random()
            * 1.2 + 0.6;
    }

    update(){

        this.y += this.speed;

        // mưa chéo nhẹ
        this.x +=
            this.speed
            * 0.12;

        if(
            this.y >
            canvas.height + 30
        ){

            // reset từ trên trời
            this.y =
                -50;

            this.x =
                this.baseX +
                (
                    Math.random()-0.5
                ) * 50;
        }
    }

    draw(){

        const gradient =
            ctx.createLinearGradient(
                this.x,
                this.y,
                this.x,
                this.y +
                this.length
            );

        gradient.addColorStop(
            0,
            "rgba(255,220,235,0)"
        );

        gradient.addColorStop(
            0.5,
            `rgba(
                255,
                120,
                180,
                ${this.opacity}
            )`
        );

        gradient.addColorStop(
            1,
            "rgba(255,80,150,0)"
        );

        ctx.beginPath();

        ctx.strokeStyle =
            gradient;

        ctx.lineWidth =
            this.width;

        ctx.shadowBlur = 12;

        ctx.moveTo(
            this.x,
            this.y
        );

        ctx.lineTo(
            this.x,
            this.y +
            this.length
        );

        ctx.stroke();
    }
}

createRain();

// recreate khi resize
window.addEventListener(
    "resize",
    ()=>{
        resize();
        createRain();
    }
);

// ================= HEART =================

const particles = [];
const TOTAL = 7000;

class Particle{

    constructor(){

        this.t =
            Math.random()
            * Math.PI * 2;

        this.radius =
            0.75 +
            Math.random() * 0.35;

        this.size =
            Math.random() * 1.5
            + 0.3;
    }

    draw(time){

        const beat =
            1 +
            Math.sin(
                time * 0.004
            ) * 0.08;

        let x =
            16 *
            Math.pow(
                Math.sin(this.t),
                3
            );

        let y = -(
            13 *
            Math.cos(this.t)
            - 5 *
            Math.cos(2*this.t)
            - 2 *
            Math.cos(3*this.t)
            - Math.cos(4*this.t)
        );

        x *= this.radius;
        y *= this.radius;

        const spread =
            12 * heartScale;

        // ===== responsive size =====
        const heartSize =
            20 * heartScale;

        const px =
            canvas.width/2 +
            x *
            heartSize *
            beat +
            (
                Math.random()-0.5
            ) * spread;

        const py =
            canvas.height/2 +
            y *
            heartSize *
            beat +
            (
                Math.random()-0.5
            ) * spread;

        const alpha =
            Math.random() *
            0.7 + 0.3;

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(
                255,
                120,
                170,
                ${alpha}
            )`;

        ctx.shadowBlur =
            12 *
            heartScale;

        ctx.arc(
            px,
            py,
            this.size
            * heartScale,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

for(let i=0;i<TOTAL;i++){
    particles.push(
        new Particle()
    );
}

// ================= TEXT ORBITS =================

// ================= HEART-BASED ORBITS =================

const orbitSystems = [
    {
        text: "Ngọc Ánh",
        radius: 11,
        speed: 0.0005,
        count: 6,
        size: 12
    },
    {
        text: "Gửi người tôi thương",
        radius: 14.5,
        speed: -0.00035,
        count: 8,
        size: 14
    },
    {
        text: "Ngọc Ánh",
        radius: 18,
        speed: 0.00025,
        count: 10,
        size: 16
    }
];

function drawTextOrbits(time){

    const cx =
        canvas.width / 2;

    const cy =
        canvas.height / 2;

    // kích thước tim thật
    const heartSize =
        20 * heartScale;

    orbitSystems.forEach(
        orbit=>{

        const planets = [];

        // orbit bám theo tim
        const orbitRadius =
            orbit.radius *
            heartSize;

        for(
            let i=0;
            i<orbit.count;
            i++
        ){

            const angle =
                time *
                orbit.speed +
                (
                    Math.PI * 2
                    / orbit.count
                ) * i;

            const depth =
                Math.cos(angle);

            const x =
                cx +
                Math.sin(angle)
                * orbitRadius;

            // ellipse dọc theo size tim
            const y =
                cy +
                Math.cos(angle)
                * orbitRadius
                * 0.28;

            const scale =
                0.55 +
                (
                    (depth + 1)
                    / 2
                ) * 0.9;

            planets.push({
                x,
                y,
                scale,
                depth
            });
        }

        planets.sort(
            (a,b)=>
            a.depth - b.depth
        );

        planets.forEach(p=>{

            ctx.save();

            ctx.translate(
                p.x,
                p.y
            );

            ctx.scale(
                p.scale,
                p.scale
            );

            const opacity =
                0.35 +
                p.scale
                * 0.65;

            // chữ scale theo tim
            const fontSize =
                orbit.size *
                heartScale;

            ctx.font =
                `bold ${fontSize}px Arial`;

            ctx.textAlign =
                "center";

            ctx.textBaseline =
                "middle";

            // padding scale theo tim
            const paddingX =
                18 * heartScale;

            const paddingY =
                10 * heartScale;

            const textWidth =
                ctx.measureText(
                    orbit.text
                ).width;

            const boxWidth =
                textWidth +
                paddingX * 2;

            const boxHeight =
                fontSize +
                paddingY * 2;

            ctx.beginPath();

            ctx.fillStyle =
                `rgba(
                    255,
                    80,
                    160,
                    ${opacity * 0.22}
                )`;

            ctx.strokeStyle =
                `rgba(
                    255,
                    180,
                    220,
                    ${opacity * 0.4}
                )`;

            ctx.lineWidth =
                1.5 *
                heartScale;

            ctx.roundRect(
                -boxWidth / 2,
                -boxHeight / 2,
                boxWidth,
                boxHeight,
                16 *
                heartScale
            );

            ctx.fill();
            ctx.stroke();

            ctx.shadowBlur =
                20 *
                p.scale *
                heartScale;

            ctx.shadowColor =
                "#ff66b3";

            ctx.fillStyle =
                `rgba(
                    255,
                    220,
                    235,
                    ${opacity}
                )`;

            ctx.fillText(
                orbit.text,
                0,
                0
            );

            ctx.restore();
        });
    });
}

// ================= ANIMATE =================

function animate(time){

    ctx.fillStyle =
        `rgba(
            8,
            11,
            24,
            0.18
        )`;

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    rainParticles.forEach(
        r=>{
            r.update();
            r.draw();
        }
    );

    particles.forEach(
        p=>p.draw(time)
    );

    drawTextOrbits(time);

    requestAnimationFrame(
        animate
    );
}

animate();
</script>

</body>
</html>
