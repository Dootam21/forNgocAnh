<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Heart</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#080b18;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);
const rainParticles = [];
const RAIN_TOTAL = 800;
class RainParticle{
    constructor(){
        this.reset();
    }

    reset(){
        this.x =
            Math.random() *
            canvas.width;

        this.y =
            Math.random() *
            canvas.height;

        this.length =
            Math.random() * 22 + 8;

        this.speed =
            Math.random() * 3 + 1;

        this.opacity =
            Math.random() * 0.7 + 0.25;

        this.width =
            Math.random() * 1.5 + 0.5;
    }

    update(){

        this.y += this.speed;
        this.x += this.speed * 0.15;

        if(this.y >
            canvas.height + 20){

            this.reset();
            this.y = -20;
        }
    }

    draw(){

        ctx.beginPath();

        const gradient =
            ctx.createLinearGradient(
                this.x,
                this.y,
                this.x,
                this.y +
                this.length
            );

        gradient.addColorStop(
            0,
            `rgba(
                255,
                220,
                235,
                0
            )`
        );

        gradient.addColorStop(
            0.5,
            `rgba(
                255,
                120,
                180,
                ${this.opacity}
            )`
        );

        gradient.addColorStop(
            1,
            `rgba(
                255,
                80,
                150,
                0
            )`
        );

        ctx.strokeStyle =
            gradient;

        ctx.lineWidth =
            this.width;

        ctx.shadowBlur = 10;

        ctx.moveTo(
            this.x,
            this.y
        );

        ctx.lineTo(
            this.x,
            this.y +
            this.length
        );

        ctx.stroke();
    }
}

for(let i=0;i<RAIN_TOTAL;i++){
    rainParticles.push(
        new RainParticle()
    );
}

// ================= HEART PARTICLES =================

const particles = [];
const TOTAL = 9000;

class Particle{
    constructor(){
        this.t = Math.random() * Math.PI * 2;
        this.radius = 0.75 + Math.random() * 0.35;
        this.size = Math.random() * 1.5 + 0.3;
    }

    draw(time){

        const beat =
            1 + Math.sin(time * 0.004) * 0.08;

        let x =
            16 * Math.pow(Math.sin(this.t),3);

        let y = -(
            13 * Math.cos(this.t)
            - 5 * Math.cos(2 * this.t)
            - 2 * Math.cos(3 * this.t)
            - Math.cos(4 * this.t)
        );

        x *= this.radius;
        y *= this.radius;

        const spread = 12;

        const px =
            canvas.width/2 +
            x * 14 * beat +
            (Math.random()-0.5) * spread;

        const py =
            canvas.height/2 +
            y * 14 * beat +
            (Math.random()-0.5) * spread;

        const alpha =
            Math.random()*0.7 + 0.3;

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(255,120,170,${alpha})`;

        ctx.shadowBlur = 12;

        ctx.arc(
            px,
            py,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

for(let i=0;i<TOTAL;i++){
    particles.push(new Particle());
}

// ================= TEXT PLANETS =================

const orbitSystems = [
    {
        text: "Ngọc Ánh",
        radius: 220,
        speed: 0.0005,
        count: 6,
        size: 12
    },
    {
        text: "Gửi người tôi thương",
        radius: 290,
        speed: -0.00035,
        count: 8,
        size: 14
    },
    {
        text: "Ngọc Ánh",
        radius: 360,
        speed: 0.00025,
        count: 10,
        size: 16
    }
];

function drawTextOrbits(time){

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    orbitSystems.forEach(orbit=>{

        const planets = [];

        for(let i=0;i<orbit.count;i++){

            const angle =
                time * orbit.speed +
                (Math.PI * 2 / orbit.count) * i;

            // quay theo trục Y
            const depth =
                Math.cos(angle);

            const x =
                cx +
                Math.sin(angle)
                * orbit.radius;

            // ellipse dọc tạo 3D
            const y =
                cy +
                Math.cos(angle)
                * orbit.radius
                * 0.28;

            const scale =
                0.55 +
                ((depth + 1) / 2) * 0.9;

            planets.push({
                x,
                y,
                scale,
                depth
            });
        }

        // render đúng lớp trước/sau
        planets.sort(
            (a,b)=>a.depth-b.depth
        );

        planets.forEach(p=>{

            ctx.save();

            ctx.translate(
                p.x,
                p.y
            );

            ctx.scale(
                p.scale,
                p.scale
            );

            const opacity =
                0.35 +
                p.scale * 0.65;

            ctx.font =
                `bold ${orbit.size}px Arial`;

            ctx.textAlign =
                "center";

            ctx.textBaseline =
                "middle";

            // ===== nền chữ =====
            const paddingX = 18;
            const paddingY = 10;

            const textWidth =
                ctx.measureText(
                    orbit.text
                ).width;

            const boxWidth =
                textWidth +
                paddingX * 2;

            const boxHeight =
                orbit.size +
                paddingY * 2;

            // nền kính mờ
            ctx.beginPath();

            ctx.fillStyle =
                `rgba(
                    255,
                    80,
                    160,
                    ${opacity * 0.22}
                )`;

            ctx.strokeStyle =
                `rgba(
                    255,
                    180,
                    220,
                    ${opacity * 0.4}
                )`;

            ctx.lineWidth = 1.5;

            const radius = 16;

            ctx.roundRect(
                -boxWidth/2,
                -boxHeight/2,
                boxWidth,
                boxHeight,
                radius
            );

            ctx.fill();
            ctx.stroke();

            // glow chữ
            ctx.shadowBlur =
                20 * p.scale;

            ctx.shadowColor =
                "#ff66b3";

            ctx.fillStyle =
                `rgba(
                    255,
                    220,
                    235,
                    ${opacity}
                )`;

            // chữ thẳng
            ctx.fillText(
                orbit.text,
                0,
                0
            );

            ctx.restore();
        });
    });
}

// ================= ANIMATION =================

function animate(time){

    ctx.fillStyle =
        "rgba(8,11,24,0.18)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    rainParticles.forEach(r=>{
    r.update();
    r.draw();
    });

    particles.forEach(p=>{
        p.draw(time);
    });

    drawTextOrbits(time);

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
